<div class="min-h-screen bg-gray-50">

  <app-navbar></app-navbar>

  <!-- CONTENIDO -->
  <main class="lg:pl-64 pb-32 lg:pb-24">

    <div class="mx-auto px-6 py-8 max-w-4xl">

      <!-- HEADER -->
      <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-8 gap-4">

        <div>
          <h1 class="text-2xl font-bold mb-2">
            Editar Perfil
          </h1>

          <p class="text-teal-600">
            Actualizá tu información personal
          </p>
        </div>

        <div class="flex items-center gap-3">

          <button
            (click)="onCancel()"
            class="px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition"
          >
            Cancelar
          </button>

          <button
            (click)="onSubmit()"
            class="px-5 py-2.5 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition"
          >
            Guardar cambios
          </button>

        </div>

      </div>

      <!-- FOTO PERFIL -->
      <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">

        <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6">

          <!-- Avatar -->
          <div class="flex flex-col items-center gap-3">

            <div class="w-20 h-20 bg-teal-200 rounded-full flex items-center justify-center text-4xl">
              👵
            </div>

            <button class="text-teal-600 text-sm hover:underline">
              Cambiar foto
            </button>

          </div>

          <!-- Opciones -->
          <div class="flex-1 w-full">

            <h3 class="text-gray-900 font-medium mb-1">
              Foto de perfil
            </h3>

            <p class="text-sm text-gray-600 mb-4">
              Formatos: JPG, PNG. Máximo 5MB
            </p>

            <div class="flex flex-col gap-2">

              <button class="px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition">
                Subir nueva foto
              </button>

              <button class="px-4 py-2 border border-red-300 text-red-600 rounded-lg hover:bg-red-50 transition">
                Eliminar foto
              </button>

            </div>

          </div>

        </div>

      </div>

      <!-- FORMULARIO -->
      <form [formGroup]="profileForm">

        <!-- INFORMACION PERSONAL -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">

          <h3 class="text-teal-600 font-medium mb-6">
            Información personal
          </h3>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <!-- Nombre -->
            <div>

              <label class="block text-sm mb-2">
                Nombre completo *
              </label>

              <input
                type="text"
                formControlName="fullName"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:border-teal-600 focus:ring-2 focus:ring-teal-200 outline-none"
              >

            </div>

            <!-- Genero -->
            <div>

              <label class="block text-sm mb-2">
                Género
              </label>

              <select
                formControlName="gender"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:border-teal-600 focus:ring-2 focus:ring-teal-200 outline-none"
              >
                <option value="Femenino">Femenino</option>
                <option value="Masculino">Masculino</option>
                <option value="Prefiero no indicar">Prefiero no indicar</option>
              </select>

            </div>

            <!-- Edad -->
            <div>

              <label class="block text-sm mb-2">
                Edad
              </label>

              <input
                type="text"
                formControlName="age"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:border-teal-600 focus:ring-2 focus:ring-teal-200 outline-none"
              >

            </div>

            <!-- Telefono -->
            <div>

              <label class="block text-sm mb-2">
                Teléfono *
              </label>

              <input
                type="text"
                formControlName="phone"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:border-teal-600 focus:ring-2 focus:ring-teal-200 outline-none"
              >

            </div>

            <!-- Direccion -->
            <div class="md:col-span-2">

              <label class="block text-sm mb-2">
                Dirección
              </label>

              <input
                type="text"
                formControlName="address"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:border-teal-600 focus:ring-2 focus:ring-teal-200 outline-none"
              >

            </div>

          </div>

        </div>

        <!-- CONTACTO EMERGENCIA -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">

          <h3 class="text-teal-600 font-medium mb-6">
            Contacto de emergencia
          </h3>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <div>

              <label class="block text-sm mb-2">
                Familiar responsable *
              </label>

              <input
                type="text"
                formControlName="emergencyName"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:border-teal-600 focus:ring-2 focus:ring-teal-200 outline-none"
              >

            </div>

            <div>

              <label class="block text-sm mb-2">
                Correo electrónico *
              </label>

              <input
                type="email"
                formControlName="emergencyEmail"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:border-teal-600 focus:ring-2 focus:ring-teal-200 outline-none"
              >

            </div>

          </div>

        </div>

        <!-- SEGURIDAD -->
        <div class="bg-white rounded-2xl shadow-sm mb-6 overflow-hidden">

          <button
            type="button"
            (click)="togglePasswordSection()"
            class="w-full p-6 flex items-center justify-between hover:bg-gray-50 transition"
          >

            <span class="text-teal-600 font-semibold">
              Seguridad - Cambiar contraseña
            </span>

          </button>

          <div *ngIf="isPasswordSectionOpen" class="px-6 pb-6 space-y-5">

            <!-- Contraseña actual -->
            <div>

              <label class="block text-sm mb-2">
                Contraseña actual
              </label>

              <input
                [type]="showPassword.current ? 'text' : 'password'"
                formControlName="currentPassword"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg"
              >

              <button
                type="button"
                (click)="toggleShowPassword('current')"
                class="text-sm text-teal-600 mt-1"
              >
                Mostrar / ocultar
              </button>

            </div>

            <!-- Nueva -->
            <div>

              <label class="block text-sm mb-2">
                Nueva contraseña
              </label>

              <input
                [type]="showPassword.new ? 'text' : 'password'"
                formControlName="newPassword"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg"
              >

              <button
                type="button"
                (click)="toggleShowPassword('new')"
                class="text-sm text-teal-600 mt-1"
              >
                Mostrar / ocultar
              </button>

            </div>

            <!-- Confirmar -->
            <div>

              <label class="block text-sm mb-2">
                Confirmar contraseña
              </label>

              <input
                [type]="showPassword.confirm ? 'text' : 'password'"
                formControlName="confirmPassword"
                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg"
              >

              <button
                type="button"
                (click)="toggleShowPassword('confirm')"
                class="text-sm text-teal-600 mt-1"
              >
                Mostrar / ocultar
              </button>

            </div>

          </div>

        </div>

      </form>

    </div>

  </main>

</div>
