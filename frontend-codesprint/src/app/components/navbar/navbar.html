<aside class="hidden lg:flex lg:flex-col lg:fixed lg:left-0 lg:top-0 lg:h-screen lg:w-64 bg-white border-r border-gray-200 p-6">
  <div class="mb-8">
    <h1 class="text-teal-600 font-bold text-xl">PuraVidaCare</h1>
  </div>
  
  <nav class="flex flex-col gap-2">
    @for (item of navItems; track item.path) {
      <a [routerLink]="item.path" 
         routerLinkActive="bg-teal-50 text-teal-600"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-700 hover:bg-gray-50 transition-all">
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>
</aside>
