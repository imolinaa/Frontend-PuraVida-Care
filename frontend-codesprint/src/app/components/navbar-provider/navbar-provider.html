<!-- Desktop Sidebar -->
<aside class="hidden lg:flex lg:flex-col lg:fixed lg:left-0 lg:top-0 lg:h-screen lg:w-64 bg-white border-r border-gray-200 p-6">
  <div class="mb-8">
    <h1 class="text-teal-600 text-xl font-bold">PuraVidaCare</h1>
  </div>
  <nav class="flex flex-col gap-2">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      routerLinkActive="bg-teal-50 text-teal-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-gray-700 hover:bg-gray-50"
    >
      <ng-icon [name]="item.icon" size="20"></ng-icon>
      <span>{{ item.label }}</span>
    </a>
  </nav>
</aside>

<!-- Mobile Bottom Navigation -->
<nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-3 z-50">
  <div class="flex justify-around items-center">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      routerLinkActive="text-teal-600"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex flex-col items-center gap-1 transition-colors text-gray-500"
    >
      <ng-icon [name]="item.icon" size="24"></ng-icon>
      <span class="text-xs">{{ item.label }}</span>
    </a>
  </div>
</nav>
