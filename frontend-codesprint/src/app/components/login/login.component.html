<div class="login-container">
  <div class="login-card">
    <h1 class="logo">PuraVidaCare</h1>
    <p class="subtitle">Inicia sesión para continuar</p>

    <button class="google-btn" (click)="loginWithGoogle()">
      <span class="google-icon">G</span>
      Continuar con Google
    </button>

    <div class="divider">
      <span>o</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="tu@email.com"
          class="form-control"
          [class.error]="f['email'].invalid && submitted"
        >
        <div class="error-message" *ngIf="f['email'].invalid && submitted">
          <span *ngIf="f['email'].errors?.['required']">Email es requerido</span>
          <span *ngIf="f['email'].errors?.['email']">Email inválido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="*********"
          class="form-control"
          [class.error]="f['password'].invalid && submitted"
        >
        <div class="error-message" *ngIf="f['password'].invalid && submitted">
          Contraseña es requerida
        </div>
      </div>

      <button type="submit" class="login-btn" [disabled]="loading">
        <span *ngIf="!loading">Iniciar sesión</span>
        <span *ngIf="loading">Cargando...</span>
      </button>
    </form>

    <div class="register-link">
      ¿No tienes cuenta? <a href="#" class="register">Regístrate</a>
    </div>

    <a href="#" class="back-link">← Volver al inicio</a>
  </div>
</div>
