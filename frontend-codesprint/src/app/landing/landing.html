<div class="min-h-screen bg-gradient-to-b from-teal-50 to-white">
  <div class="container mx-auto px-6 py-16">
    <div class="text-center mb-16">
      <h1 class="text-5xl mb-6 text-gray-900 font-bold">
        Bienvenido a <span class="text-teal-600">PuraVidaCare</span>
      </h1>
      <p class="text-xl text-gray-600 mb-8 max-w-2xl mx-auto">
        La plataforma que conecta familias con proveedores de cuidado profesional
      </p>
      <button (click)="irALogin()" class="bg-teal-600 text-white text-lg px-8 py-4 rounded-xl hover:bg-teal-700 transition-all shadow-lg hover:shadow-teal-200">
        Iniciar sesión
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mt-24">
      <div *ngFor="let feature of features" 
           class="bg-white rounded-2xl p-8 shadow-sm hover:shadow-md transition-shadow border border-gray-100">
        <div class="w-12 h-12 bg-teal-100 rounded-xl flex items-center justify-center mb-4 text-teal-600">
          <span class="font-bold text-xl">{{ feature.iconChar }}</span>
        </div>
        <h3 class="font-bold text-gray-900 mb-2">{{ feature.title }}</h3>
        <p class="text-gray-600 text-sm">{{ feature.description }}</p>
      </div>
    </div>

    <div class="mt-24 bg-teal-600 rounded-3xl p-12 text-center text-white shadow-xl">
      <h2 class="text-3xl font-bold mb-4">¿Eres proveedor de cuidado?</h2>
      <p class="text-lg mb-8 text-teal-50">
        Únete a nuestra plataforma y conecta con familias que necesitan tus servicios
      </p>
      <button (click)="irALogin()" class="bg-white text-teal-600 font-bold px-8 py-3 rounded-xl hover:bg-teal-50 transition-colors">
        Comenzar ahora
      </button>
    </div>
  </div>
</div>
